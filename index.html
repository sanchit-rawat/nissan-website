<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Nissan GT-R</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  color: white;
  background: black;
}

/* HERO WITH IMAGE */
.hero {
  height: 100vh;
  background: url("https://images.unsplash.com/photo-1619767886558-efdc7b9b6c9e") center/cover no-repeat;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  background-blend-mode: darken;
  background-color: rgba(0,0,0,0.7);
}

.hero h1 {
  font-size: 60px;
  color: red;
  text-shadow: 0 0 20px red;
}

.hero p {
  color: #ccc;
}

button {
  margin-top: 20px;
  padding: 12px 30px;
  background: red;
  border: none;
  color: white;
  cursor: pointer;
  font-size: 16px;
}

button:hover {
  box-shadow: 0 0 20px red;
}

/* SECTION */
.section {
  padding: 60px 20px;
  text-align: center;
}

.section h2 {
  color: red;
}

/* CARDS */
.cards {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
}

.card {
  background: #111;
  border: 1px solid red;
  margin: 15px;
  padding: 25px;
  width: 220px;
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.05);
  box-shadow: 0 0 20px red;
}
</style>

</head>

<body>

<div class="hero">
  <h1>Nissan GT-R</h1>
  <p>Godzilla Machine</p>
  <button>Explore</button>
</div>

<div class="section">
  <h2>Specifications</h2>

  <div class="cards">
    <div class="card">Engine: 3.8L Twin Turbo</div>
    <div class="card">Power: 565 HP</div>
    <div class="card">0-100: 2.9 sec</div>
    <div class="card">Top Speed: 315 km/h</div>
  </div>

</div>

</body>
</html>
