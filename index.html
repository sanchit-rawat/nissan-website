<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nissan Legacy</title>

<style>
/* RESET */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

/* THEME */
body {
  background: #0a0a0a;
  color: white;
  transition: 0.4s;
}

body.light {
  background: #f5f5f5;
  color: #111;
}

/* NAV */
nav {
  position: fixed;
  width: 100%;
  padding: 15px 30px;
  backdrop-filter: blur(10px);
  display: flex;
  justify-content: space-between;
  z-index: 1000;
}

.toggle {
  cursor: pointer;
  padding: 8px 15px;
  border-radius: 20px;
  background: red;
  color: white;
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
  background: linear-gradient(to right, #000, #111);
}

.hero h1 {
  font-size: 3rem;
  animation: fadeIn 2s ease;
}

.hero button {
  margin-top: 20px;
  padding: 12px 25px;
  background: red;
  border: none;
  color: white;
  border-radius: 30px;
  cursor: pointer;
  transition: 0.3s;
}

.hero button:hover {
  transform: scale(1.1);
  box-shadow: 0 0 20px red;
}

/* SECTION */
section {
  padding: 80px 20px;
  text-align: center;
}

/* CARDS */
.cards {
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
  justify-content: center;
}

.card {
  width: 250px;
  padding: 20px;
  border-radius: 15px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  transition: 0.4s;
}

.card:hover {
  transform: translateY(-10px) scale(1.05);
  box-shadow: 0 0 25px red;
}

.card img {
  width: 100%;
  border-radius: 10px;
}

/* FOOTER */
footer {
  padding: 20px;
  text-align: center;
  opacity: 0.7;
}

/* ANIMATIONS */
@keyframes fadeIn {
  from {opacity: 0; transform: translateY(20px);}
  to {opacity: 1; transform: translateY(0);}
}

/* SCROLL REVEAL */
.reveal {
  opacity: 0;
  transform: translateY(50px);
  transition: 1s;
}

.reveal.active {
  opacity: 1;
  transform: translateY(0);
}
</style>
</head>

<body>

<nav>
  <h2>NISSAN</h2>
  <div class="toggle" onclick="toggleTheme()">Theme</div>
</nav>

<div class="hero">
  <h1>Precision. Power. Nissan.</h1>
  <button onclick="playSound()">Explore</button>
</div>

<section class="reveal">
  <h2>Legacy</h2>
  <p>Decades of innovation, speed, and engineering excellence.</p>
</section>

<section class="reveal">
  <h2>Cars</h2>
  <div class="cards">
    <div class="card">
      <img src="https://upload.wikimedia.org/wikipedia/commons/7/7c/Nissan_GT-R.jpg">
      <h3>GT-R</h3>
      <p>Legendary performance beast</p>
    </div>

    <div class="card">
      <img src="https://upload.wikimedia.org/wikipedia/commons/3/3e/Nissan_370Z.jpg">
      <h3>370Z</h3>
      <p>Pure sports DNA</p>
    </div>

    <div class="card">
      <img src="https://upload.wikimedia.org/wikipedia/commons/0/0b/Nissan_Magnite.jpg">
      <h3>Magnite</h3>
      <p>Compact SUV power</p>
    </div>
  </div>
</section>

<footer>
  <p>© 2026 Nissan Inspired Design</p>
</footer>

<!-- SOUND -->
<audio id="clickSound">
  <source src="https://www.soundjay.com/buttons/sounds/button-16.mp3">
</audio>

<script>
function toggleTheme() {
  document.body.classList.toggle("light");
}

function playSound() {
  document.getElementById("clickSound").play();
}

/* SCROLL ANIMATION */
window.addEventListener("scroll", () => {
  let reveals = document.querySelectorAll(".reveal");

  reveals.forEach(el => {
    let windowHeight = window.innerHeight;
    let elementTop = el.getBoundingClientRect().top;

    if (elementTop < windowHeight - 100) {
      el.classList.add("active");
    }
  });
});
</script>

</body>
</html>
