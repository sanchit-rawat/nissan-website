<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glass UI Website</title>

<style>
:root {
  --bg: #0b0f1a;
  --glass: rgba(255,255,255,0.06);
  --border: rgba(255,255,255,0.12);
  --text: #eaf0ff;
  --accent: #8bb4ff;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Segoe UI", sans-serif;
}

body {
  min-height: 100vh;
  background:
    radial-gradient(circle at top left, rgba(139,180,255,0.15), transparent 40%),
    radial-gradient(circle at bottom right, rgba(170,130,255,0.12), transparent 40%),
    var(--bg);
  color: var(--text);
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Glass container */
.container {
  width: 90%;
  max-width: 900px;
  padding: 40px;
  border-radius: 16px;
  background: var(--glass);
  backdrop-filter: blur(20px);
  border: 1px solid var(--border);
  box-shadow: 0 10px 40px rgba(0,0,0,0.4);
}

/* Title */
h1 {
  font-size: 2.5rem;
  margin-bottom: 10px;
}

p {
  color: #aab4d6;
  margin-bottom: 30px;
}

/* Cards */
.cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px,1fr));
  gap: 20px;
}

.card {
  padding: 20px;
  border-radius: 12px;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px);
  box-shadow: 0 0 20px rgba(139,180,255,0.3);
}

/* Button */
button {
  margin-top: 20px;
  padding: 10px 20px;
  border-radius: 10px;
  border: none;
  background: var(--accent);
  color: black;
  cursor: pointer;
  font-weight: bold;
}

button:hover {
  opacity: 0.8;
}
</style>

</head>

<body>

<div class="container">
  <h1>Glassmorphism UI 🔥</h1>
  <p>Clean modern glass design working perfectly on your website.</p>

  <div class="cards">
    <div class="card">⚡ Fast</div>
    <div class="card">🎨 Stylish</div>
    <div class="card">🚀 Smooth</div>
  </div>

  <button>Explore</button>
</div>

</body>
</html>
