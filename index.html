<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glass UI</title>

<style>
:root {
  --bg: #0b0f1a;
  --glass: rgba(255,255,255,0.05);
  --border: rgba(255,255,255,0.12);
  --text: #eaf0ff;
  --accent: #8bb4ff;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Segoe UI", sans-serif;
}

body {
  background: linear-gradient(180deg,#05070d,#0b0f1a);
  color: var(--text);
}

/* NAVBAR */
.nav {
  display: flex;
  justify-content: space-between;
  padding: 20px 40px;
}

.nav h2 { color: var(--accent); }

/* HERO */
.hero {
  height: 90vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

.glass {
  padding: 40px;
  border-radius: 16px;
  background: var(--glass);
  backdrop-filter: blur(20px);
  border: 1px solid var(--border);
  text-align: center;
}

.glass h1 {
  font-size: 3rem;
}

.glass button {
  margin-top: 20px;
  padding: 10px 20px;
  border-radius: 10px;
  border: none;
  background: var(--accent);
  cursor: pointer;
}

/* SECTION */
.section {
  padding: 80px 40px;
}

.cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px,1fr));
  gap: 20px;
}

.card {
  padding: 20px;
  border-radius: 12px;
  background: var(--glass);
  border: 1px solid var(--border);
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px);
  box-shadow: 0 0 20px rgba(139,180,255,0.3);
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="nav">
  <h2>GlassUI</h2>
  <p>Home | About | Contact</p>
</div>

<!-- HERO -->
<div class="hero">
  <div class="glass">
    <h1>Glass UI 🔥</h1>
    <p>Now it looks like a real website</p>
    <button>Explore</button>
  </div>
</div>

<!-- FEATURES -->
<div class="section">
  <h2>Features</h2>
  <div class="cards">
    <div class="card">⚡ Fast</div>
    <div class="card">🎨 Stylish</div>
    <div class="card">🚀 Smooth</div>
  </div>
</div>

</body>
</html>
