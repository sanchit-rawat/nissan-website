<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nissan GT-R | The Legend</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #030303;
            --accent-red: #E60000;
            --accent-glow: rgba(230, 0, 0, 0.6);
            --text-main: #FFFFFF;
            --text-muted: #A0A0A0;
            --glass-bg: rgba(15, 15, 15, 0.4);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Rajdhani', sans-serif;
            overflow: hidden; /* Keeps the hero section locked to the viewport */
        }

        /* --- Animated Background Elements --- */
        .background-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -2;
            overflow: hidden;
            background: radial-gradient(circle at center, #111 0%, #030303 100%);
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.5;
            animation: float 20s infinite ease-in-out alternate;
        }

        .orb-1 {
            width: 400px;
            height: 400px;
            background: var(--accent-red);
            top: -100px;
            left: -100px;
            animation-duration: 25s;
        }

        .orb-2 {
            width: 300px;
            height: 300px;
            background: #440000;
            bottom: -50px;
            right: 10vw;
            animation-delay: -5s;
        }

        /* Subtle Cyber Grid Overlay */
        .grid-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100vw;
            height: 40vh;
            background-image: 
                linear-gradient(transparent 95%, rgba(230, 0, 0, 0.15) 100%),
                linear-gradient(90deg, transparent 95%, rgba(230, 0, 0, 0.15) 100%);
            background-size: 50px 50px;
            transform: perspective(500px) rotateX(60deg);
            transform-origin: bottom;
            z-index: -1;
            opacity: 0.6;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(50px, 30px) scale(1.1); }
            100% { transform: translate(-30px, 80px) scale(0.9); }
        }

        /* --- Navigation (Glassmorphism) --- */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 20px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--glass-border);
            z-index: 100;
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            font-weight: 900;
            letter-spacing: 2px;
            color: var(--text-main);
            text-shadow: 0 0 10px var(--accent-glow);
        }

        .nav-links {
            display: flex;
            gap: 30px;
        }

        .nav-links a {
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 600;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: color 0.3s ease, text-shadow 0.3s ease;
        }

        .nav-links a:hover {
            color: var(--text-main);
            text-shadow: 0 0 8px var(--accent-red);
        }

        /* --- Hero Section --- */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
            z-index: 10;
        }

        .hero h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 6rem;
            font-weight: 900;
            letter-spacing: 5px;
            text-transform: uppercase;
            background: linear-gradient(180deg, #FFFFFF 0%, #A0A0A0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            filter: drop-shadow(0 0 20px rgba(255,255,255,0.1));
            opacity: 0;
            transform: translateY(30px);
            animation: fadeUp 1s ease forwards 0.2s;
        }

        .hero p {
            font-size: 1.5rem;
            color: var(--accent-red);
            font-weight: 600;
            letter-spacing: 8px;
            text-transform: uppercase;
            margin-bottom: 40px;
            text-shadow: 0 0 15px var(--accent-glow);
            opacity: 0;
            transform: translateY(30px);
            animation: fadeUp 1s ease forwards 0.5s;
        }

        .cta-btn {
            display: inline-block;
            padding: 15px 40px;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text-main);
            text-decoration: none;
            text-transform: uppercase;
            background: transparent;
            border: 1px solid var(--accent-red);
            border-radius: 4px;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(230, 0, 0, 0.2);
            opacity: 0;
            transform: translateY(30px);
            animation: fadeUp 1s ease forwards 0.8s;
        }

        .cta-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: var(--accent-red);
            transition: all 0.4s ease;
            z-index: -1;
        }

        .cta-btn:hover::before {
            left: 0;
        }

        .cta-btn:hover {
            box-shadow: 0 0 30px var(--accent-glow);
            border-color: transparent;
        }

        @keyframes fadeUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* --- Interactive Mouse Glow --- */
        #cursor-glow {
            position: fixed;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(230,0,0,0.15) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: 1;
            transition: width 0.2s, height 0.2s;
        }
    </style>
</head>
<body>

    <div class="background-container">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>
    <div class="grid-overlay"></div>

    <div id="cursor-glow"></div>

    <nav>
        <div class="logo">GT-R</div>
        <div class="nav-links">
            <a href="#">Performance</a>
            <a href="#">Design</a>
            <a href="#">Legacy</a>
        </div>
    </nav>

    <header class="hero">
        <h1>Nissan GT-R</h1>
        <p>Godzilla Performance Machine</p>
        <a href="#" class="cta-btn">Unleash Power</a>
    </header>

    <script>
        // Interactive soft glowing light that follows the cursor
        const cursorGlow = document.getElementById('cursor-glow');

        document.addEventListener('mousemove', (e) => {
            requestAnimationFrame(() => {
                cursorGlow.style.left = `${e.clientX}px`;
                cursorGlow.style.top = `${e.clientY}px`;
            });
        });
    </script>
</body>
</html>
