<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Draw The Perfect Circle</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0e14;
            --accent: #00f2ff;
            --text: #ffffff;
            --panel: rgba(255, 255, 255, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-touch-callout: none;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            touch-action: none;
            cursor: crosshair;
        }

        .ui-layer {
            position: relative;
            z-index: 10;
            pointer-events: none;
            text-align: center;
            width: 100%;
        }

        .header {
            position: absolute;
            top: 40px;
            width: 100%;
        }

        h1 {
            font-weight: 300;
            letter-spacing: 4px;
            text-transform: uppercase;
            font-size: 1.2rem;
            opacity: 0.6;
        }

        .score-container {
            display: none;
            flex-direction: column;
            align-items: center;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .percentage {
            font-size: 6rem;
            font-weight: 700;
            margin-bottom: 10px;
            color: var(--accent);
            text-shadow: 0 0 30px rgba(0, 242, 255, 0.4);
        }

        .feedback {
            font-size: 1.5rem;
            font-weight: 300;
            margin-bottom: 30px;
            color: #888;
        }

        .btn {
            pointer-events: auto;
            background: var(--text);
            color: var(--bg);
            border: none;
            padding: 15px 40px;
            font-size: 1rem;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        .hint {
            position: absolute;
            bottom: 40px;
            width: 100%;
            font-size: 0.9rem;
            opacity: 0.4;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <div class="ui-layer header" id="headerText">
        <h1>Draw the perfect circle</h1>
    </div>

    <div class="ui-layer">
        <div class="score-container" id="scoreContainer">
            <div class="percentage" id="scoreValue">0.00%</div>
            <div class="feedback" id="feedbackText">Are you a robot?</div>
            <button class="btn" id="retryBtn">Try Again</button>
        </div>
    </div>

    <div class="ui-layer hint" id="hintText">
        CLICK AND DRAG TO DRAW
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreContainer = document.getElementById('scoreContainer');
        const scoreValue = document.getElementById('scoreValue');
        const feedbackText = document.getElementById('feedbackText');
        const retryBtn = document.getElementById('retryBtn');
        const headerText = document.getElementById('headerText');
        const hintText = document.getElementById('hintText');

        let isDrawing = false;
        let points = [];
        let canDraw = true;

        // Resize canvas
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // Input Handlers
        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', draw);
        window.addEventListener('mouseup', endDrawing);

        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); startDrawing(e.touches[0]); });
        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); draw(e.touches[0]); });
        window.addEventListener('touchend', endDrawing);

        function startDrawing(e) {
            if (!canDraw) return;
            isDrawing = true;
            points = [];
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            scoreContainer.style.display = 'none';
            headerText.style.opacity = '0';
            hintText.style.opacity = '0';
            addPoint(e.clientX, e.clientY);
        }

        function draw(e) {
            if (!isDrawing) return;
            addPoint(e.clientX, e.clientY);
            renderLine();
        }

        function addPoint(x, y) {
            points.push({ x, y });
        }

        function renderLine() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.beginPath();
            ctx.strokeStyle = '#00f2ff';
            ctx.lineWidth = 4;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#00f2ff';

            for (let i = 0; i < points.length; i++) {
                if (i === 0) ctx.moveTo(points[i].x, points[i].y);
                else ctx.lineTo(points[i].x, points[i].y);
            }
            ctx.stroke();
        }

        function endDrawing() {
            if (!isDrawing) return;
            isDrawing = false;
            if (points.length < 20) {
                resetUI();
                return;
            }
            canDraw = false;
            calculateScore();
        }

        function calculateScore() {
            // 1. Center of mass
            let sumX = 0, sumY = 0;
            points.forEach(p => { sumX += p.x; sumY += p.y; });
            const centerX = sumX / points.length;
            const centerY = sumY / points.length;

            // 2. Average Radius
            let totalRadius = 0;
            const radii = points.map(p => {
                const dist = Math.sqrt((p.x - centerX) ** 2 + (p.y - centerY) ** 2);
                totalRadius += dist;
                return dist;
            });
            const avgRadius = totalRadius / points.length;

            // 3. Mathematical Variance (The Penalty)
            let variance = 0;
            radii.forEach(r => {
                variance += Math.abs(r - avgRadius);
            });
            const avgVariance = variance / points.length;

            // 4. Smoothness / Closing the loop penalty
            const startPoint = points[0];
            const endPoint = points[points.length - 1];
            const gap = Math.sqrt((startPoint.x - endPoint.x) ** 2 + (startPoint.y - endPoint.y) ** 2);
            const gapPenalty = (gap / avgRadius) * 100;

            // Calculate final percentage
            // We scale the variance against the radius. 0.0 variance = 100%
            let score = 100 - ( (avgVariance / avgRadius) * 100 ) - (gapPenalty * 0.5);
            
            if (score < 0) score = 0;
            displayScore(score);
        }

        function displayScore(score) {
            scoreValue.innerText = score.toFixed(2) + "%";
            
            let message = "";
            if (score >= 95) message = "Are you a robot?";
            else if (score >= 80) message = "Almost perfect!";
            else if (score >= 60) message = "Decent human effort.";
            else message = "That's... not a circle.";

            feedbackText.innerText = message;
            scoreContainer.style.display = 'flex';
        }

        retryBtn.addEventListener('click', () => {
            resetUI();
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        });

        function resetUI() {
            canDraw = true;
            scoreContainer.style.display = 'none';
            headerText.style.opacity = '0.6';
            hintText.style.opacity = '0.4';
        }

    </script>
</body>
</html>
