<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glassmorphism UI</title>

<style>

/* ==UserStyle==
@name YouTube Advanced Glassmorphism
==/UserStyle== */

:root {
  --glass-blur: 20px;
  --glass-radius: 12px;
  --glass-bg: rgba(12,16,26,0.56);
  --glass-bg-soft: rgba(18,23,34,0.45);
  --glass-border: rgba(255,255,255,0.16);
  --text-main: #f2f5ff;
  --accent: #8bb4ff;
}

/* Background */
body {
  margin: 0;
  font-family: Arial, sans-serif;
  color: var(--text-main);

  background:
    radial-gradient(1200px 900px at -12% -18%, rgba(139,180,255,0.14), transparent 60%),
    linear-gradient(180deg, #090c15 0%, #07090f 100%);
}

/* Glass card */
.glass {
  background: var(--glass-bg);
  border: 1px solid var(--glass-border);
  border-radius: var(--glass-radius);
  backdrop-filter: blur(var(--glass-blur));
  padding: 20px;
  margin: 40px auto;
  width: 300px;
  text-align: center;
}

/* Button */
button {
  background: var(--glass-bg-soft);
  border: 1px solid var(--glass-border);
  color: white;
  padding: 10px 20px;
  border-radius: 10px;
  cursor: pointer;
}

button:hover {
  box-shadow: 0 0 20px var(--accent);
}

</style>
</head>

<body>

<div class="glass">
  <h1>Glass UI 🔥</h1>
  <p>This is now working correctly.</p>
  <button>Click Me</button>
</div>

</body>
</html>
