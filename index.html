<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Windows 11 Glass Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');

        :root {
            --glass-bg: rgba(255, 255, 255, 0.4);
            --glass-border: rgba(255, 255, 255, 0.2);
            --blur: 20px;
        }

        .dark {
            --glass-bg: rgba(20, 20, 20, 0.6);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Inter', sans-serif;
            transition: background 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
        }

        /* High-Gloss Glassmorphism */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(var(--blur)) saturate(180%);
            -webkit-backdrop-filter: blur(var(--blur)) saturate(180%);
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2);
        }

        /* Smooth Motion Blur Animation */
        .window-entry {
            animation: slideIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            filter: blur(10px);
            opacity: 0;
        }

        @keyframes slideIn {
            from { transform: translateY(40px) scale(0.95); filter: blur(15px); opacity: 0; }
            to { transform: translateY(0) scale(1); filter: blur(0px); opacity: 1; }
        }

        /* Glossy Reflection Effect */
        .glossy::after {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; height: 50%;
            background: linear-gradient(to bottom, rgba(255,255,255,0.1) 0%, transparent 100%);
            pointer-events: none;
        }

        .bg-blob {
            filter: blur(80px);
            z-index: -1;
            transition: all 1s ease-in-out;
        }
    </style>
</head>
<body class="bg-slate-100 dark:bg-zinc-950 h-screen flex items-center justify-center p-6">

    <!-- Dynamic Animated Background -->
    <div class="fixed inset-0 overflow-hidden">
        <div id="blob1" class="bg-blob absolute top-[-10%] left-[-10%] w-96 h-96 bg-blue-400 opacity-30 rounded-full animate-pulse"></div>
        <div id="blob2" class="bg-blob absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-purple-500 opacity-30 rounded-full"></div>
    </div>

    <!-- Main Content Container -->
    <main class="window-entry glass-panel glossy relative w-full max-w-4xl h-[600px] rounded-3xl p-8 flex flex-col overflow-hidden">
        
        <!-- Header / Nav -->
        <header class="flex justify-between items-center mb-12">
            <div class="flex items-center gap-3">
                <svg class="w-8 h-8 text-blue-500" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M0 0h11.387v11.387H0V0zm12.613 0H24v11.387H12.613V0zM0 12.613h11.387V24H0V12.613zm12.613 0H24V24H12.613V12.613z"/>
                </svg>
                <h1 class="text-xl font-semibold dark:text-white">Windows 11 <span class="font-light opacity-60">Flow</span></h1>
            </div>

            <!-- Theme Toggle -->
            <button onclick="toggleTheme()" class="glass-panel p-3 rounded-2xl hover:scale-110 active:scale-95 transition-all duration-300">
                <span id="theme-icon" class="dark:text-white">🌙</span>
            </button>
        </header>

        <!-- Hero Section -->
        <section class="flex-1 flex flex-col justify-center">
            <h2 class="text-5xl font-bold mb-4 dark:text-white tracking-tight">
                Design <span class="text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-400">Simplified.</span>
            </h2>
            <p class="text-lg text-zinc-600 dark:text-zinc-400 max-w-md mb-8 leading-relaxed">
                Experience the next generation of aesthetic computing. Clean lines, fluid motion, and professional clarity.
            </p>
            
            <div class="flex gap-4">
                <button class="bg-blue-600 hover:bg-blue-500 text-white px-8 py-3 rounded-xl font-medium transition-all shadow-lg shadow-blue-500/20 active:scale-95">
                    Explore
                </button>
                <button class="glass-panel dark:text-white px-8 py-3 rounded-xl font-medium hover:bg-white/10 transition-all">
                    Docs
                </button>
            </div>
        </section>

        <!-- Bottom Taskbar-style tray -->
        <footer class="mt-auto flex justify-center">
            <div class="glass-panel px-6 py-3 rounded-2xl flex gap-6 items-center">
                <div class="w-2 h-2 rounded-full bg-blue-500"></div>
                <div class="w-2 h-2 rounded-full bg-zinc-300 dark:bg-zinc-700"></div>
                <div class="w-2 h-2 rounded-full bg-zinc-300 dark:bg-zinc-700"></div>
            </div>
        </footer>
    </main>

    <script>
        function toggleTheme() {
            const html = document.documentElement;
            const icon = document.getElementById('theme-icon');
            
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                icon.innerText = '☀️';
            } else {
                html.classList.add('dark');
                icon.innerText = '🌙';
            }
        }

        // Randomize background blob movement for "Fluid" feel
        document.addEventListener('mousemove', (e) => {
            const b1 = document.getElementById('blob1');
            const b2 = document.getElementById('blob2');
            const x = e.clientX / 50;
            const y = e.clientY / 50;

            b1.style.transform = `translate(${x}px, ${y}px)`;
            b2.style.transform = `translate(${-x}px, ${-y}px)`;
        });
    </script>
</body>
</html>
