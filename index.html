<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>GT-R</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: black;
  color: white;
}

/* NAV */
.nav {
  padding: 15px;
  background: #111;
  text-align: center;
  color: red;
}

/* HERO */
.hero {
  text-align: center;
  padding: 100px 20px;
}

.hero h1 {
  font-size: 40px;
  color: red;
}

/* BUTTON */
button {
  padding: 10px 20px;
  background: red;
  border: none;
  color: white;
  cursor: pointer;
}

/* SECTION */
.section {
  padding: 40px;
  text-align: center;
}

/* CARDS */
.card {
  background: #111;
  margin: 10px;
  padding: 20px;
  border: 1px solid red;
}
</style>

</head>

<body>

<div class="nav">
  GT-R Website
</div>

<div class="hero">
  <h1>Nissan GT-R</h1>
  <p>Godzilla Machine</p>
  <button>Explore</button>
</div>

<div class="section">
  <h2>Specs</h2>

  <div class="card">Engine: 3.8L Twin Turbo</div>
  <div class="card">Power: 565 HP</div>
  <div class="card">0-100: 2.9 sec</div>
  <div class="card">Top Speed: 315 km/h</div>

</div>

</body>
</html>
